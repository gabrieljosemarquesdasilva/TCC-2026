<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Beach Tennis ETEC</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="admin-login-body">
<div class="admin-card">
  <div class="admin-logo-area">
    <div class="admin-logo-icon"><i class="fa-solid fa-shield-halved"></i></div>
    <h1>Painel Admin</h1>
    <p class="subtitle">Beach Tennis ETEC — Acesso restrito</p>
  </div>
  <div class="admin-erro" id="erroBox"><i class="fa-solid fa-circle-exclamation"></i><span id="erroMsg"></span></div>
  <div class="admin-field">
    <label>Usuário</label>
    <div class="admin-input-wrap">
      <i class="fa-solid fa-user"></i>
      <input type="text" id="adUser" placeholder="Digite seu usuário" autocomplete="username">
    </div>
  </div>
  <div class="admin-field">
    <label>Senha</label>
    <div class="admin-input-wrap">
      <i class="fa-solid fa-lock"></i>
      <input type="password" id="adSenha" placeholder="••••••••" autocomplete="current-password">
      <button class="admin-toggle-pw" onclick="togglePw()" type="button"><i class="fa-regular fa-eye" id="eyeIcon"></i></button>
    </div>
  </div>
  <button class="admin-btn-entrar" id="btnEntrar" onclick="login()">
    <span class="lbl-a"><i class="fa-solid fa-right-to-bracket"></i> Entrar no Painel</span>
  </button>
  <div style="text-align:center;margin-top:18px;">
    <a href="index.html" style="font-size:.82rem;color:#9BB;text-decoration:none;">← Voltar ao site</a>
  </div>
</div>
<script>
function togglePw(){
  const i=document.getElementById('adSenha');
  const eye=document.getElementById('eyeIcon');
  i.type=i.type==='password'?'text':'password';
  eye.className=i.type==='password'?'fa-regular fa-eye':'fa-regular fa-eye-slash';
}
function mostrarErro(msg){
  const b=document.getElementById('erroBox');
  document.getElementById('erroMsg').textContent=msg;
  b.classList.add('show');
}
function login(){
  const btn=document.getElementById('btnEntrar');
  const usuario=document.getElementById('adUser').value.trim();
  const senha=document.getElementById('adSenha').value;
  if(!usuario||!senha){mostrarErro('Preencha usuário e senha.');return;}
  document.getElementById('erroBox').classList.remove('show');
  btn.classList.add('admin-btn-loading');btn.disabled=true;
  fetch('/admin/auth',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({usuario,senha})
  })
  .then(r=>r.json())
  .then(d=>{
    btn.classList.remove('admin-btn-loading');btn.disabled=false;
    if(d.sucesso){
      localStorage.setItem('adminToken',d.token);
      localStorage.setItem('adminNome',d.admin);
      window.location.href='admin_dashboard.html';
    }else mostrarErro(d.erro||'Credenciais incorretas.');
  })
  .catch(()=>{btn.classList.remove('admin-btn-loading');btn.disabled=false;mostrarErro('Erro ao conectar com o servidor.');});
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')login();});
</script>
</body>
</html>
