 function handleCredentialResponse(response) {
  const idToken = jwtDecode(response.credential);

}

  window.onload = function () {

      client_id: '314377682610-qnrudcuk611ou7kse4v4m9a86v980pth.apps.googleusercontent.com',

<section class="auth-section">
  <div class="auth-card">
    <div style="text-align:center; margin-bottom:32px;">
      <span style="font-size:2.5rem;">🎾</span>
      <h2 style="margin-top:8px;">Entrar</h2>
      <p class="sub">Bem-vindo de volta à quadra!</p>
    </div>

    <!-- Social -->
    <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:24px;">
      <button  class="google-btn" id="loginDiv" style="display:flex;align-items:center;gap:12px;padding:13px 20px;border:2px solid #E8EFF5;border-radius:12px;background:white;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;transition:border-color 0.2s;" onmouseover="this.style.borderColor='#0077B6'" onmouseout="this.style.borderColor='#E8EFF5'">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" width="20" alt="Google">
        <span>Continue com Google</span>
      </button>

    </div>

    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
      <div style="flex:1;height:1px;background:#E8EFF5;"></div>
      <span style="color:#9BB;font-size:0.82rem;font-weight:600;letter-spacing:0.1em;">OU</span>
      <div style="flex:1;height:1px;background:#E8EFF5;"></div>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" placeholder="seu@email.com" required>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="botao-agendar" style="width:100%;justify-content:center;margin-top:8px;">
        Entrar na Conta
      </button>
    </form>

    <p style="text-align:center;margin-top:24px;color:#9BB;font-size:0.9rem;">
      Não tem conta? <a href="../cadastro_usuario/cadastro.html" class="switch">Cadastre-se grátis</a>
    </p>
  </div>
</section>
