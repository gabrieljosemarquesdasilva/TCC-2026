<script type="module">
  import { jwtDecode } from "https://cdn.jsdelivr.net/npm/jwt-decode@4.0.0/+esm";

 function handleCredentialResponse(response) {
  const idToken = jwtDecode(response.credential);
  console.log(idToken);

const dadosUsuario = {
        google_id: idToken.sub,
        nome: idToken.name,
        email: idToken.email,
        foto: idToken.picture
    };

    // Envia para backend
    fetch("http://localhost:3000/login-google", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(dadosUsuario)
    })
    .then(res => res.json())
    .then(data => {
        console.log("Salvo no banco:", data);
    })
    .catch(err => {
        console.error("Erro:", err);
    });

}

  window.onload = function () {
    google.accounts.id.initialize({
      client_id: '314377682610-qnrudcuk611ou7kse4v4m9a86v980pth.apps.googleusercontent.com',
      callback: handleCredentialResponse
    });

    google.accounts.id.renderButton(
      document.getElementById("loginDiv"),
      { theme: "filled_blue", size: "large", shape: "pill", }
    );
  };
</script>

<script>
// ── HAMBURGER MENU ──
(function() {
  var btn = document.getElementById('hamburgerBtn');
  var overlay = document.getElementById('menuOverlay');
  var menu = document.getElementById('menuMobile');
  function abrirMenu() {
    btn.classList.add('aberto');
    overlay.classList.add('aberto');
    menu.classList.add('aberto');
    document.body.style.overflow = 'hidden';
  }
  function fecharMenu() {
    btn.classList.remove('aberto');
    overlay.classList.remove('aberto');
    menu.classList.remove('aberto');
    document.body.style.overflow = '';
  }
  if (btn) btn.addEventListener('click', function() {
    btn.classList.contains('aberto') ? fecharMenu() : abrirMenu();
  });
  if (overlay) overlay.addEventListener('click', fecharMenu);
  // Mark active link
  var links = document.querySelectorAll('.menu-mobile a');
  var current = window.location.pathname.split('/').pop() || 'index.html';
  links.forEach(function(a) {
    if (a.getAttribute('href') === current) a.classList.add('ativo');
  });
})();
</script>
