    <link rel="stylesheet" href="style-cadastro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header>
        <nav>
            <ul class="menu">
            <li><a href="../index.html"><i class="fa-solid fa-house"></i> Início</a></li>
            <li><a href="../agendamento.html"><i class="fa-solid fa-calendar-check"></i> Agendamento</a></li>

            <li><a href="../perfil.html"><i class="fa-solid fa-user"></i> Perfil</a></li>
        </ul>
        </nav>
</header>



    <div class="container">

    <div id="esquerda">
        <h1>Já possui uma conta?</h1>
        <ul class="botao-logar">
            <li><a href="../login_usuario/login.html">Logar</a></li>
        </ul>
    </div>

    
    <div id="direita">
    <h1 id="titulo">Cadastrar-se</h1>

    

   <form id="inscricao-form" >

        <div class="div-form-nome-sobrenome">
          <div>
            <label>NOME</label>
            <input type="text" placeholder="Seu nome"/>
          </div>
          <div>
            <label>SOBRENOME</label>
            <input type="text" placeholder="Seu sobrenome"/>
          </div>
        </div>

        <div>
          <label>E-MAIL</label>
          <input type="email" placeholder="seu@email.com" id="input-maior"/>
        </div>

        <div>
          <label>TELEFONE / WHATSAPP</label>
          <input type="tel" placeholder="(11) 99999-9999" id="input-maior"/>
        </div>

        <div>
          <label>SENHA</label>
          <input type="tel" placeholder="********" id="input-maior"/>
        </div>

        <div>
          <label>DATA DE NASCIMENTO</label>
          <input type="date" id="input-maior"/>
        </div>

        <div>
          <label>OBSERVAÇÕES (OPCIONAL)</label>
          <textarea placeholder="Alguma informação adicional..." rows="3" id="input-maior"></textarea>
        </div>

        <button type="submit" id="botao-criar">
           CONFIRMAR INSCRIÇÃO
        </button>
      </form>
    </div>
    
</div>
</body>
</html>
