<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style-cadastro.css">
</head>
<body>
    <div class="container">

    <div id="esquerda">
        <h1>Já possui uma conta?</h1>
        <p>Logar</p>
    </div>

    
    <div id="direita">
    <h1 id="titulo">Cadastrar-se</h1>

    

    <form action="" >
        <p></p>
        <input type="text" name="nome" placeholder="Nome" class="input">

        <p></p>
        <input type="text" name="email" placeholder="Email" class="input">

        <p></p>
        <input type="text" name="senha" placeholder="Senha" class="input">
        <p></p>
        <input type="submit" name="enviar" value="Criar conta" id="botao-criar">

    </form>
    </div>
    
</div>
</body>
</html>
