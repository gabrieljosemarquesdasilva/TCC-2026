<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style-cadastro.css">
</head>
<body>

<header>
        <nav>
            <ul class="menu">
                <li><a href="../index.html">Início</a></li>
                <li><a href="../agendamento.html">Agendamento</a></li>
                <li><a href="../sobre.html">Sobre</a></li>
                <li><a href="../contato.html">Contato</a></li>
            </ul>
        </nav>
</header>



    <div class="container">

    <div id="esquerda">
        <h1>Já possui uma conta?</h1>
        <p>Logar</p>
    </div>

    
    <div id="direita">
    <h1 id="titulo">Cadastrar-se</h1>

    

   <form id="inscricao-form" >

        <div class="div-form-nome-sobrenome">
          <div>
            <label>NOME</label>
            <input type="text" placeholder="Seu nome"/>
          </div>
          <div>
            <label>SOBRENOME</label>
            <input type="text" placeholder="Seu sobrenome"/>
          </div>
        </div>

        <div>
          <label>E-MAIL</label>
          <input type="email" placeholder="seu@email.com" id="input-maior"/>
        </div>

        <div>
          <label>TELEFONE / WHATSAPP</label>
          <input type="tel" placeholder="(11) 99999-9999" id="input-maior"/>
        </div>

        <div class="div-select">
          <div>
            <label>MODALIDADE</label>
            <select>
              <option value="">Selecione</option>
              <option>🎾 Tênis</option>
              <option>🏖️ Beach Tennis</option>
              <option>🏓 Padel</option>
            </select>
          </div>
          <div>
            <label>NÍVEL</label>
            <select>
              <option value="">Selecione</option>
              <option>Iniciante</option>
              <option>Intermediário</option>
              <option>Avançado / PRO</option>
            </select>
          </div>
        </div>

        <div>
          <label>DATA DE NASCIMENTO</label>
          <input type="date" id="input-maior"/>
        </div>

        <div>
          <label>OBSERVAÇÕES (OPCIONAL)</label>
          <textarea placeholder="Alguma informação adicional..." rows="3" id="input-maior"></textarea>
        </div>

        <button type="submit" id="botao-criar">
          ✅ CONFIRMAR INSCRIÇÃO
        </button>
      </form>
    </div>
    
</div>
</body>
</html>
