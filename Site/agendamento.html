        <!-- Seção Agendamento -->
    <section id="agendamento">
        <h1>Agendamento de horarios</h1>
        <p>Aqui você agenda seus horários.</p>
    </section>
    

<form id="form-agendamento">

<label>Nome</label>
<input type="text" name="nome" required>

<label>Quadra</label>
<select id="quadra" name="quadra">
<option>Quadra 1</option>
<option>Quadra 2</option>
</select>


<div class="div-select">
    <div>
        <label>Modalidade</label>
        <select>
            <option value="" disabled selected hidden>Selecione</option>
            <option>🎾 Tênis</option>
            <option>🏖️ Beach Tennis</option>
            <option>🏓 Padel</option>
        </select>
        </div>
        <div>
        <label>Nível</label>
        <select>
          <option value="" disabled selected hidden>Selecione</option>
          <option>Iniciante</option>
          <option>Intermediário</option>
          <option>Avançado / PRO</option>
        </select>
    </div>
</div>

<label>Data</label>
<input type="date" name="data" required>
<label>Hora</label>
<input type="time" id="horario" name="horario">

<label>Duração</label>
<select name="duracao">
<option>1 hora</option>
<option>2 horas</option>
</select>

<label>Observação</label>
<textarea name="obs"></textarea>


<button type="submit">Reservar Quadra</button>

</form>
