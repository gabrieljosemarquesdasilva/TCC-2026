<section id="inicio"></section>

    <div class="container">


      <div id="esquerda">
        <h1>Não possui uma conta?</h1>
        <ul class="botao-cadastrar">
            <li><a href="../cadastro_usuario/cadastro.html">Cadastrar</a></li>
        </ul>
    </div>

    
    <div id="direita">
    <h1 id="titulo">Logar</h1>

    

   <form id="login-form" >

        <div>
          <label>E-MAIL</label>
          <input type="email" placeholder="seu@email.com" id="input-maior"/>
        </div>

        <div>
          <label>Senha</label>
          <input type="password" id="input-maior" placeholder="********"/>
        </div>


        <button type="submit" id="botao-continuar">
           Continuar
        </button>
      </form>

      <h3 class="divisor"><span>OU</span></h3>

      <div class="social-buttons">
        <button class="btn google">
          <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" alt="Google">
            <span>Continue com Google</span>
        </button>

        <button class="btn apple">
          <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/apple/apple-original.svg" alt="Apple">
            <span>Continue com Apple</span> 
        </button>
      </div>
